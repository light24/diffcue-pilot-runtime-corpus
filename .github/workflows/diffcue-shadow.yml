# generated-by: diffcue-pilot
name: DiffCue Shadow

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  diffcue-shadow:
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - name: Checkout full history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: DiffCue doctor
        run: diffcue pilot doctor --repo . --network off
      - name: DiffCue read-only shadow run
        run: >-
          diffcue pilot run --repo . --base "${{ github.event.pull_request.base.sha || 'HEAD^' }}"
          --head "${{ github.event.pull_request.head.sha || 'HEAD' }}" --read-only --no-publish
          --network off --timeout 15m --memory-limit 4GiB --concurrency 1
          --artifact-dir "$RUNNER_TEMP/diffcue-pilot"
      - name: Upload DiffCue artifact
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: diffcue-shadow-${{ github.run_id }}
          path: ${{ runner.temp }}/diffcue-pilot
          if-no-files-found: warn
          retention-days: 14
